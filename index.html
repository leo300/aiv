<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>AI Vision Assistant</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <script src="
https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <script src="
https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="app">
      <h1> 🧠 AI Vision Assistant </h1>
      <div id="camera">
        <video id="video" autoplay playsinline></video>
        <canvas id="overlay"></canvas>
      </div>
      <div class="status" id="status"> Loading AI... </div>
      <div class="result">
        <h2 id="objects"> Searching... </h2>
        <p id="confidence"></p>
      </div>
      <div class="buttons">
        <button onclick="switchCamera()">🔄 Switch Camera</button>
        <button onclick="capture()"> 📸 Screenshot </button>
        <button onclick="assistantMode()"> 🤖 Describe </button>
        <button onclick="toggleVoice()"> 🔊 Voice </button>
      </div>
      <canvas id="chart"></canvas>
    </div>
    <script src="app.js"></script>
  </body>
</html>
